services:

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: tasklogger
      DB_USER: tasklogger
      DB_PASSWORD: tasklogger
      RSYSLOG_HOST: rsyslog
      RSYSLOG_PORT: 514
    volumes:
      - ./app:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  rsyslog:
    build:
      context: .
      dockerfile: docker/rsyslog/Dockerfile
    ports:
      - "514:514/udp"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tasklogger
      MYSQL_USER: tasklogger
      MYSQL_PASSWORD: tasklogger
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
